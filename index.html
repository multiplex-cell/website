      return { x:q.x,y:q.y,w:q.w,cx:cx,cy:cy,d:d,
        slot:Math.floor(h1*10), phase:h2, dur:3.4+h1*4.6, max:0.72+h2*0.28 };
    });

    function pulse(f){ if(f<0.12)return f/0.12; if(f<0.56)return 1; if(f<0.72)return 1-(f-0.56)/0.16; return 0; }
    function breath(f){ return 0.45+0.55*Math.sin(f*Math.PI*2-Math.PI/2); }
    function easeInOut(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
    function frac(x){ return x-Math.floor(x); }
    var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

    function draw(now){
      ctx.fillStyle=BACKDROP; ctx.fillRect(0,0,CW,CH);
      var t=now/1000;
      for(var i=0;i<squares.length;i++){
        var q=squares[i], op;
        if(reduce){ op=q.max; }
        else if(MOTION==='breathe'){ op=q.max*Math.max(0,breath(frac(t/4.2+q.phase*0.10))); }
        else if(MOTION==='wave'){ op=q.max*pulse(frac(t/4.6-q.d*1.7)); }
        else { op=q.max*pulse(frac(t/q.dur+q.phase)); }
        if(op<=0.01) continue;
        var e=easeInOut(Math.min(1,op/q.max));
        var sz=q.w*GRAIN*(0.5+0.5*e);
        ctx.globalAlpha=op;
        ctx.fillStyle=PALETTE[q.slot%PALETTE.length];
        ctx.fillRect(q.cx-sz/2, q.cy-sz/2, sz, sz);
      }
      ctx.globalAlpha=1;
      if(!reduce) requestAnimationFrame(draw);
    }
    draw(performance.now());
  })();
  </script>
</body>
</html>
